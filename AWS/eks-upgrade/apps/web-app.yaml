---
# ──────────────────────────────────────────────────────────────────────
# App A — "web-app"   (nginx, 3 replicas, RollingUpdate, PDB)
# Demonstrates zero-downtime across a node-group rolling upgrade.
# ──────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: default
  labels:
    app: web-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        # one extra pod is created before an old one is removed
      maxUnavailable: 0  # zero pods unavailable at any point during the rollout
  template:
    metadata:
      labels:
        app: web-app
    spec:
      # Spread pods across nodes AND AZs so a single node drain
      # never takes out all replicas.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: web-app
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: web-app
      terminationGracePeriodSeconds: 30
      containers:
        - name: web-app
          image: public.ecr.aws/nginx/nginx:1.27-alpine
          ports:
            - containerPort: 80
          readinessProbe:        # pod is only marked Ready when nginx is serving
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          lifecycle:
            preStop:
              exec:
                # Give the load-balancer time to deregister this pod
                # before nginx starts rejecting new connections.
                command: ["/bin/sh", "-c", "sleep 5"]
---
apiVersion: v1
kind: Service
metadata:
  name: web-app
  namespace: default
spec:
  selector:
    app: web-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer
---
# PodDisruptionBudget — ensures at least 2 pods remain available
# while nodes are drained during the managed node group rolling upgrade.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: web-app-pdb
  namespace: default
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: web-app
